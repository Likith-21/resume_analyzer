[logger]
level = "warning"

[client]
showErrorDetails = false
toolbarMode = "minimal"

[theme]
primaryColor = "#667eea"
backgroundColor = "#f8f9fa"
secondaryBackgroundColor = "#f0f2f6"
textColor = "#2d3748"
font = "sans serif"

[server]
maxUploadSize = 200
enableXsrfProtection = true
enableCORS = true

[browser]
gatherUsageStats = false
serverAddress = "undefined"

[runner]
magicEnabled = true

